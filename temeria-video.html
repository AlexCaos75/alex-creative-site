<style>
body{
  background:black;
  color:white;
  text-align:center;
  font-family:Arial, sans-serif;
  margin:0;
  padding:0;
}
.container{
  max-width:700px;
  margin:auto;
  padding:20px;
}
.hero-img{
  width:100%;
  border-radius:20px;
  margin-top:20px;
  box-shadow:0 0 25px rgba(255,255,255,0.15);
}
.home-btn{
  display:block;
  margin:25px auto;
  padding:14px 26px;
  border-radius:30px;
  background:linear-gradient(90deg,#7dd3fc,#c084fc);
  color:black;
  font-weight:bold;
  text-decoration:none;
  max-width:260px;
}
.play-btn{
  margin:25px auto 10px;
  padding:16px 32px;
  border:none;
  border-radius:35px;
  background:linear-gradient(90deg,#7dd3fc,#c084fc);
  color:black;
  font-size:18px;
  font-weight:bold;
  cursor:pointer;
  box-shadow:0 0 25px rgba(192,132,252,0.45);
}
.play-btn:hover{
  transform:scale(1.03);
}
video{
  display:none;
  width:100%;
  border-radius:20px;
  margin-top:20px;
}
p{
  font-size:18px;
  line-height:1.5;
}
</style>
</head>

<body>

<div class="container">

<img src="https://alex-creative-site.vercel.app/temeria-preview.jpg" class="hero-img" alt="Temeria - La Fata delle Piume">

<a href="https://alex-creative-site.vercel.app" class="home-btn">🏠 Torna alla home</a>

<h1>Temeria - La Fata delle Piume</h1>

<p>Una presenza che non si vede… ma si sente. Tra sogno e realtà nasce Temeria, la fata delle piume. Un viaggio tra musica, emozione e magia. Lasciati trasportare.</p>

<button id="playBtn" class="play-btn" onclick="avviaVideo()">
▶ Ascolta / Guarda
</button>

<video id="v" controls playsinline preload="metadata" poster="https://alex-creative-site.vercel.app/temeria-preview.jpg">
  <source src="https://alex-creative-site.vercel.app/temeria-preview.mp4" type="video/mp4">
</video>

</div>

<script>
function avviaVideo(){
  const v = document.getElementById('v');
  const btn = document.getElementById('playBtn');

  v.style.display = 'block';
  btn.style.display = 'none';

  setTimeout(() => {
    v.play();
  }, 200);
}
</script>

</body>
