<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>🎬 Temeria ULTRA Generator PRO</title>

<style>
body {
  background:#0b0f1a;
  color:white;
  font-family:Arial;
  padding:20px;
}
input, textarea {
  width:100%;
  padding:10px;
  margin:6px 0;
  border-radius:10px;
  border:none;
}
button {
  padding:10px;
  margin:4px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
}
.main-btn { background:#22c55e; color:black; }
.copy-btn { background:white; color:black; }
.danger { background:#ef4444; color:white; }
.box {
  background:#111827;
  padding:15px;
  border-radius:15px;
  margin-top:15px;
}
.preview img, .preview video {
  max-width:400px;
  border-radius:15px;
}
.card {
  background:#1f2937;
  padding:10px;
  border-radius:10px;
  margin:5px;
  cursor:pointer;
}
</style>
</head>

<body>

<h2>🚀 Temeria ULTRA Generator PRO</h2>

<input id="title" placeholder="Titolo">
<textarea id="desc" placeholder="Descrizione"></textarea>
<input id="video" placeholder="Video.mp4">
<input id="imageSite" placeholder="Immagine SITO">
<input id="imageFB" placeholder="Immagine FACEBOOK (opzionale)">
<input id="page" placeholder="Nome pagina">

<button class="main-btn" onclick="genera()">🚀 Genera</button>
<button onclick="salva()">💾 Salva progetto</button>

<div id="preview" class="box"></div>

<div class="box">
<h3>📄 Codice</h3>
<textarea id="output"></textarea>
<button class="copy-btn" onclick="copy('output')">📋 Copia</button>
<button onclick="download()">⬇️ Scarica</button>
</div>

<div class="box">
<h3>🔗 Link</h3>
<textarea id="linkOut"></textarea>
<button class="copy-btn" onclick="copy('linkOut')">📋 Copia</button>
</div>

<div class="box">
<h3>🎞 Archivio Progetti</h3>
<div id="lista"></div>
</div>

<script>

const base = "https://alex-creative-site.vercel.app";

function fix(file){
 if(!file) return "";
 if(file.startsWith("http")) return file;
 return base+"/"+file;
}

// 🔥 FIX DESCRIZIONE (no a capo)
function cleanDesc(text){
 return text.replace(/\n/g,' ').replace(/\s+/g,' ').trim();
}

function genera(){

if(!titleEl().value || !videoEl().value || !imageEl().value || !pageEl().value){
 alert("Compila almeno titolo, video, immagine sito e pagina");
 return;
}

const title = titleEl().value;
const desc = cleanDesc(descEl().value);
const video = fix(videoEl().value);
const img = fix(imageEl().value);

// fallback immagine FB
let fb = imageFBEl().value ? fix(imageFBEl().value) : img;

// URL pulito
let page = pageEl().value
.toLowerCase()
.replace(/\s+/g,'-')
.replace(/[^a-z0-9\-]/g,'');

pageEl().value = page;

const url = base+"/"+page+".html";

// preview
preview().innerHTML = `
<h3>${title}</h3>
<img src="${img}">
<br><br>
<video controls>
  <source src="${video}" type="video/mp4">
</video>
`;

// HTML finale
const html = `<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>${title}</title>

<link rel="icon" href="${img}">

<meta property="og:title" content="${title}">
<meta property="og:description" content="${desc}">
<meta property="og:image" content="${fb}">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta property="og:url" content="${url}">
<meta property="og:type" content="video.other">
<meta property="og:site_name" content="Alex Creative Site">

<meta name="twitter:card" content="summary_large_image">

<style>
body{background:black;color:white;text-align:center;font-family:Arial;}
.container{max-width:700px;margin:auto;padding:20px;}
</style>
</head>

<body>

<div onclick="
this.style.opacity='0';
setTimeout(()=>{
 this.style.display='none';
 let v=document.getElementById('v');
 v.style.display='block';
 v.play();
},300);
"
style="transition:0.3s;cursor:pointer;max-width:700px;margin:20px auto;position:relative;">

<img src="${img}" style="width:100%;border-radius:20px;">

<div style="
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:80px;
height:80px;
border-radius:50%;
background:rgba(255,255,255,0.9);
display:flex;
align-items:center;
justify-content:center;
font-size:35px;
color:black;
box-shadow:0 0 20px rgba(0,0,0,0.6);
">
▶
</div>

</div>

<div class="container">

<a href="${base}" style="
display:block;
margin:20px auto;
padding:14px 26px;
border-radius:30px;
background:linear-gradient(90deg,#7dd3fc,#c084fc);
color:black;
font-weight:bold;
text-decoration:none;
max-width:260px;">
🏠 Torna alla home
</a>

<h2>${title}</h2>
<p>${desc}</p>

<video id="v" controls playsinline preload="metadata" poster="${img}" 
style="display:none;width:100%;border-radius:20px;margin-top:15px;">
  <source src="${video}" type="video/mp4">
</video>

</div>

</body>
</html>`;

output().value = html;
link().value = url;

}

// STORAGE
function salva(){
 let arr = JSON.parse(localStorage.getItem("temeria")||"[]");
 arr.push({
  title:titleEl().value,
  desc:descEl().value,
  video:videoEl().value,
  image:imageEl().value,
  fb:imageFBEl().value,
  page:pageEl().value
 });
 localStorage.setItem("temeria",JSON.stringify(arr));
 caricaLista();
}

function caricaLista(){
 let arr = JSON.parse(localStorage.getItem("temeria")||"[]");
 lista().innerHTML="";
 arr.forEach((p,i)=>{
  lista().innerHTML+=`
  <div class="card" onclick="load(${i})">
   ${p.title}
   <button class="danger" onclick="del(${i});event.stopPropagation()">X</button>
  </div>`;
 });
}

function load(i){
 let p = JSON.parse(localStorage.getItem("temeria"))[i];
 titleEl().value=p.title;
 descEl().value=p.desc;
 videoEl().value=p.video;
 imageEl().value=p.image;
 imageFBEl().value=p.fb;
 pageEl().value=p.page;
}

function del(i){
 let arr = JSON.parse(localStorage.getItem("temeria"));
 arr.splice(i,1);
 localStorage.setItem("temeria",JSON.stringify(arr));
 caricaLista();
}

// UTILITY
function copy(id){
 let el=document.getElementById(id);
 el.select();
 document.execCommand("copy");
 alert("Copiato!");
}

function download(){
 let blob=new Blob([output().value],{type:"text/html"});
 let a=document.createElement("a");
 a.href=URL.createObjectURL(blob);
 a.download = pageEl().value + ".html";
 a.click();
}

// helpers
const titleEl=()=>document.getElementById("title");
const descEl=()=>document.getElementById("desc");
const videoEl=()=>document.getElementById("video");
const imageEl=()=>document.getElementById("imageSite");
const imageFBEl=()=>document.getElementById("imageFB");
const pageEl=()=>document.getElementById("page");
const output=()=>document.getElementById("output");
const link=()=>document.getElementById("linkOut");
const preview=()=>document.getElementById("preview");
const lista=()=>document.getElementById("lista");

caricaLista();

</script>

</body>
</html>
