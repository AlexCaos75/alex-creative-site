<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>🎬 Generatore Video Temeria PRO</title>

<style>
body {
  background:#0b0f1a;
  color:white;
  font-family:Arial;
  padding:30px;
}

input, textarea {
  width:100%;
  padding:10px;
  margin:8px 0;
  border-radius:10px;
  border:none;
}

button {
  padding:12px 20px;
  background:white;
  color:black;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

textarea {
  height:200px;
}

.preview {
  margin-top:20px;
  text-align:center;
}

.preview video {
  width:100%;
  max-width:500px;
  border-radius:15px;
}

.preview img {
  max-width:500px;
  border-radius:15px;
}

.error {
  color:red;
  font-size:14px;
}
</style>
</head>

<body>

<h2>🎬 Generatore Video Temeria PRO</h2>

<input id="title" placeholder="Titolo video">
<textarea id="desc" placeholder="Descrizione"></textarea>
<input id="video" placeholder="Video (es: temeria-preview.mp4)">
<input id="image" placeholder="Immagine (es: temeria-preview.jpg)">
<input id="page" placeholder="Nome pagina (es: temeria-video)">

<button onclick="genera()">🚀 Genera tutto</button>

<div class="error" id="error"></div>

<h3>👁 Anteprima</h3>
<div class="preview" id="preview"></div>

<h3>📄 Pagina Video</h3>
<textarea id="output"></textarea>

<h3>🌐 Blocco per index.html</h3>
<textarea id="indexBlock"></textarea>

<h3>🔗 Link pronto</h3>
<textarea id="linkOut"></textarea>

<script>

function fixPath(file) {
  if (!file) return "";
  if (file.startsWith("http")) return file;
  return "https://alex-creative-site.vercel.app/" + file;
}

function genera() {

  const title = document.getElementById('title').value;
  const desc = document.getElementById('desc').value;
  const video = document.getElementById('video').value;
  const image = document.getElementById('image').value;
  const page = document.getElementById('page').value;

  const errorBox = document.getElementById('error');
  errorBox.innerText = "";

  if (!title || !video || !image || !page) {
    errorBox.innerText = "⚠️ Compila tutti i campi obbligatori";
    return;
  }

  const base = "https://alex-creative-site.vercel.app";
  const url = base + "/" + page + ".html";

  const videoPath = fixPath(video);
  const imagePath = fixPath(image);

  // ANTEPRIMA LIVE
  document.getElementById('preview').innerHTML = `
    <h4>${title}</h4>
    <img src="${imagePath}">
    <br><br>
    <video controls src="${videoPath}"></video>
  `;

  // PAGINA VIDEO
  const codice = `<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">

<title>${title}</title>

<meta property="og:title" content="${title}">
<meta property="og:description" content="${desc}">
<meta property="og:image" content="${imagePath}">
<meta property="og:url" content="${url}">
<meta property="og:type" content="video.other">

<meta name="twitter:card" content="summary_large_image">

<style>
body {
  margin:0;
  background:black;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  height:100vh;
  color:white;
  font-family:Arial;
  text-align:center;
}

video {
  width:100%;
  max-width:900px;
  border-radius:20px;
  box-shadow:0 0 40px rgba(0,0,0,0.7);
}

.btn {
  margin-top:25px;
  padding:14px 30px;
  border-radius:30px;
  background:linear-gradient(90deg,#7dd3fc,#c084fc);
  color:black;
  font-weight:bold;
  text-decoration:none;
  box-shadow:0 0 20px rgba(192,132,252,0.6);
}

</style>

</head>

<body>

<h2>${title}</h2>
<p>${desc}</p>

<video controls autoplay poster="${imagePath}">
  <source src="${videoPath}" type="video/mp4">
</video>

<a href="${base}" class="btn">🌐 Visita il sito completo</a>

</body>
</html>`;

  // BLOCCO INDEX
  const blocco = `<a href="${url}" style="text-decoration:none;color:white;">
<div style="
  border-radius:20px;
  overflow:hidden;
  position:relative;
  max-width:400px;
  margin:auto;
">
  <img src="${imagePath}" style="width:100%;">
  <div style="
    position:absolute;
    bottom:0;
    left:0;
    right:0;
    padding:10px;
    background:rgba(0,0,0,0.7);
  ">
    <strong>${title}</strong>
    <p style="margin:0;font-size:13px;">Guarda il frammento</p>
  </div>
</div>
</a>`;

  document.getElementById('output').value = codice;
  document.getElementById('indexBlock').value = blocco;
  document.getElementById('linkOut').value = url;
}

</script>

</body>
</html>
