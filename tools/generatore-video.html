<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>🎬 Temeria ULTRA Generator</title>

<style>
body {
  background:#0b0f1a;
  color:white;
  font-family:Arial;
  padding:20px;
}

input, textarea {
  width:100%;
  padding:10px;
  margin:6px 0;
  border-radius:10px;
  border:none;
}

button {
  padding:10px;
  margin:4px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
}

.main-btn { background:#22c55e; color:black; }
.copy-btn { background:white; color:black; }
.danger { background:#ef4444; color:white; }

.box {
  background:#111827;
  padding:15px;
  border-radius:15px;
  margin-top:15px;
}

.preview img, .preview video {
  max-width:400px;
  border-radius:15px;
}

.card {
  background:#1f2937;
  padding:10px;
  border-radius:10px;
  margin:5px;
  cursor:pointer;
}
</style>
</head>

<body>

<h2>🚀 Temeria ULTRA Generator</h2>

<input id="title" placeholder="Titolo">
<textarea id="desc" placeholder="Descrizione"></textarea>
<input id="video" placeholder="Video.mp4">
<input id="imageSite" placeholder="Immagine SITO">
<input id="imageFB" placeholder="Immagine FACEBOOK">
<input id="page" placeholder="Nome pagina">

<button class="main-btn" onclick="genera()">🚀 Genera</button>
<button onclick="salva()">💾 Salva progetto</button>

<div id="preview" class="box"></div>

<div class="box">
<h3>📄 Codice</h3>
<textarea id="output"></textarea>
<button class="copy-btn" onclick="copy('output')">📋 Copia</button>
<button onclick="download()">⬇️ Scarica</button>
</div>

<div class="box">
<h3>🔗 Link</h3>
<textarea id="linkOut"></textarea>
<button class="copy-btn" onclick="copy('linkOut')">📋 Copia</button>
</div>

<div class="box">
<h3>🎞 Archivio Progetti</h3>
<div id="lista"></div>
</div>

<script>

const base = "https://alex-creative-site.vercel.app";

function fix(file){
 if(!file) return "";
 if(file.startsWith("http")) return file;
 return base+"/"+file;
}

function genera(){
if(!titleEl().value || !videoEl().value || !imageEl().value || !imageFBEl().value || !pageEl().value){
 alert("Compila tutti i campi");
 return;
}
 const title = titleEl().value;
 const desc = descEl().value;
 const video = fix(videoEl().value);
 const img = fix(imageEl().value);
 const fb = fix(imageFBEl().value);
const page = pageEl().value
  .toLowerCase()
  .replace(/\s+/g,'-')
  .replace(/[^a-z0-9\-]/g,'');

pageEl().value = page;


 const url = base+"/"+page+".html";

 preview().innerHTML = `
 <h3>${title}</h3>
 <img src="${img}">
 <br><br>
 <video controls style="margin-top:10px;">
  <source src="${video}" type="video/mp4">
</video>
 `;

 const html = `<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>${title}</title>

<meta property="og:title" content="${title}">
<meta property="og:description" content="${desc}">
<meta property="og:image" content="${fb}">
<meta property="og:url" content="${url}">
<meta property="og:type" content="video.other">

<style>
body{background:black;color:white;text-align:center;font-family:Arial;}
.container{max-width:700px;margin:auto;padding:20px;}
</style>
</head>

<body>

<a href="${video}" style="display:block;text-decoration:none;">
<img src="${fb}" style="width:100%;max-width:700px;border-radius:20px;">
</a>

<div class="container">

<a href="${base}" style="
display:inline-block;
margin-bottom:20px;
padding:12px 26px;
border-radius:30px;
background:linear-gradient(90deg,#7dd3fc,#c084fc);
color:black;
font-weight:bold;
text-decoration:none;">
🌐 Vai al sito completo
</a>

<h2>${title}</h2>
<p>${desc}</p>

<div onclick="this.style.display='none';document.getElementById('v').style.display='block';document.getElementById('v').play();" style="cursor:pointer;">
<img src="${img}" style="width:100%;border-radius:20px;">
</div>

<video id="v" controls playsinline poster="${img}" style="display:none;width:100%;border-radius:20px;margin-top:15px;">
  <source src="${video}" type="video/mp4">
</video>
</div>

</body>
</html>`;

 output().value = html;
 link().value = url;
}

function salva(){
 const data = {
  title:titleEl().value,
  desc:descEl().value,
  video:videoEl().value,
  image:imageEl().value,
  fb:imageFBEl().value,
  page:pageEl().value
 };
 let arr = JSON.parse(localStorage.getItem("temeria")||"[]");
 arr.push(data);
 localStorage.setItem("temeria",JSON.stringify(arr));
 caricaLista();
}

function caricaLista(){
 let arr = JSON.parse(localStorage.getItem("temeria")||"[]");
 lista().innerHTML = "";
 arr.forEach((p,i)=>{
  lista().innerHTML += `
  <div class="card" onclick="load(${i})">
   ${p.title}
   <button class="danger" onclick="del(${i});event.stopPropagation()">X</button>
  </div>`;
 });
}

function load(i){
 let arr = JSON.parse(localStorage.getItem("temeria"));
 let p = arr[i];
 titleEl().value=p.title;
 descEl().value=p.desc;
 videoEl().value=p.video;
 imageEl().value=p.image;
 imageFBEl().value=p.fb;
 pageEl().value=p.page;
}

function del(i){
 let arr = JSON.parse(localStorage.getItem("temeria"));
 arr.splice(i,1);
 localStorage.setItem("temeria",JSON.stringify(arr));
 caricaLista();
}

function copy(id){
 let el=document.getElementById(id);
 el.select();
 document.execCommand("copy");
 alert("Copiato!");
}

function download(){
 let blob=new Blob([output().value],{type:"text/html"});
 let a=document.createElement("a");
 a.href=URL.createObjectURL(blob);
a.download = pageEl().value + ".html";
 a.click();
}

// helpers
const titleEl=()=>document.getElementById("title");
const descEl=()=>document.getElementById("desc");
const videoEl=()=>document.getElementById("video");
const imageEl=()=>document.getElementById("imageSite");
const imageFBEl=()=>document.getElementById("imageFB");
const pageEl=()=>document.getElementById("page");
const output=()=>document.getElementById("output");
const link=()=>document.getElementById("linkOut");
const preview=()=>document.getElementById("preview");
const lista=()=>document.getElementById("lista");

caricaLista();

</script>

</body>
</html>
