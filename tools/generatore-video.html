<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>🎬 Generatore Video Temeria PRO</title>

<style>
body {
  background:#0b0f1a;
  color:white;
  font-family:Arial;
  padding:30px;
}

input, textarea {
  width:100%;
  padding:10px;
  margin:8px 0;
  border-radius:10px;
  border:none;
}

button {
  padding:12px 20px;
  background:white;
  color:black;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

textarea {
  height:200px;
}

.preview {
  margin-top:20px;
  text-align:center;
}

.preview video {
  width:100%;
  max-width:500px;
  border-radius:15px;
}

.preview img {
  max-width:500px;
  border-radius:15px;
}

.error {
  color:red;
  font-size:14px;
}
</style>
</head>

<body>

<h2>🎬 Generatore Video Temeria PRO</h2>

<input id="title" placeholder="Titolo video">
<textarea id="desc" placeholder="Descrizione"></textarea>
<input id="video" placeholder="Video (es: temeria-preview.mp4)">
<input id="imageSite" placeholder="Immagine SITO (es: temeria-sito.jpg)">
<input id="imageFB" placeholder="Immagine FACEBOOK 1200x630 (es: temeria-facebook.jpg)">
<input id="page" placeholder="Nome pagina (es: temeria-video)">

<button onclick="genera()">🚀 Genera tutto</button>

<div class="error" id="error"></div>

<h3>👁 Anteprima</h3>
<div class="preview" id="preview"></div>

<h3>📄 Pagina Video</h3>
<textarea id="output"></textarea>

<h3>🌐 Blocco per index.html</h3>
<textarea id="indexBlock"></textarea>

<h3>🔗 Link pronto</h3>
<textarea id="linkOut"></textarea>

<script>

function fixPath(file) {
  if (!file) return "";
  if (file.startsWith("http")) return file;
  return "https://alex-creative-site.vercel.app/" + file;
}

function genera() {

  const title = document.getElementById('title').value;
  const desc = document.getElementById('desc').value;
  const video = document.getElementById('video').value;
  const imageSite = document.getElementById('imageSite').value;
  const imageFB = document.getElementById('imageFB').value;
  const page = document.getElementById('page').value;

  const errorBox = document.getElementById('error');
  errorBox.innerText = "";

  if (!title || !video || !imageSite || !imageFB || !page) {
    errorBox.innerText = "⚠️ Compila tutti i campi obbligatori";
    return;
  }

  const base = "https://alex-creative-site.vercel.app";
  const url = base + "/" + page + ".html";

  const videoPath = fixPath(video);
  const imageSitePath = fixPath(imageSite);
  const imageFBPath = fixPath(imageFB);

  // ANTEPRIMA
  document.getElementById('preview').innerHTML = `
    <h4>${title}</h4>
    <img src="${imageSitePath}">
    <br><br>
    <video controls src="${videoPath}"></video>
  `;

  // PAGINA VIDEO (FIX FACEBOOK)
  const codice = `<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">

<title>${title}</title>

<meta property="og:title" content="${title}">
<meta property="og:description" content="${desc}">
<meta property="og:image" content="${imageFBPath}">
<meta property="og:url" content="${url}">
<meta property="og:type" content="video.other">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">

<meta property="og:video" content="${videoPath}">
<meta property="og:video:type" content="video/mp4">
<meta property="og:video:width" content="1280">
<meta property="og:video:height" content="720">

<meta name="twitter:card" content="summary_large_image">

<style>
body {
  margin:0;
  background:black;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:flex-start;
  min-height:100vh;
  color:white;
  font-family:Arial;
  text-align:center;
  padding:30px 15px;
}

.container {
  max-width:700px;
  width:100%;
}

video {
  width:100%;
  max-width:700px;
  border-radius:20px;
  box-shadow:0 0 40px rgba(0,0,0,0.7);
  margin-top:20px;
}

.top-btn {
  display:inline-block;
  margin-bottom:20px;
  padding:12px 26px;
  border-radius:30px;
  background:white;
  color:black;
  font-weight:bold;
  text-decoration:none;
}

.floating-btn {
  position:fixed;
  bottom:20px;
  right:20px;
  padding:12px 20px;
  border-radius:30px;
  background:linear-gradient(90deg,#7dd3fc,#c084fc);
  color:black;
  font-weight:bold;
  text-decoration:none;
}
</style>

</head>

<body>

<div class="container">

<a href="${base}" class="top-btn">🌐 Vai al sito completo</a>

<h2>${title}</h2>
<p>${desc}</p>

<!-- IMMAGINE VISIBILE (fix Facebook) -->
<img src="${imageFBPath}" style="width:100%; border-radius:20px; margin-bottom:15px;">

<video controls muted autoplay playsinline poster="${imageSitePath}">
  <source src="${videoPath}" type="video/mp4">
</video>

</div>

<a href="${base}" class="floating-btn">🌐 Sito</a>

</body>
</html>`;

  // BLOCCO INDEX (NON TOCCA FACEBOOK)
  const blocco = `<a href="${url}" style="text-decoration:none;color:white;">
<div style="border-radius:20px;overflow:hidden;position:relative;max-width:400px;margin:auto;">
  <img src="${imageSitePath}" style="width:100%;">
  <div style="position:absolute;bottom:0;left:0;right:0;padding:10px;background:rgba(0,0,0,0.7);">
    <strong>${title}</strong>
    <p style="margin:0;font-size:13px;">Guarda il frammento</p>
  </div>
</div>
</a>`;

  document.getElementById('output').value = codice;
  document.getElementById('indexBlock').value = blocco;
  document.getElementById('linkOut').value = url;
}

</script>

</body>
</html>
