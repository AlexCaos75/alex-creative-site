<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>🎬 Generatore Video Temeria PRO</title>

<style>
body {
  background:#0b0f1a;
  color:white;
  font-family:Arial;
  padding:30px;
}

input, textarea {
  width:100%;
  padding:10px;
  margin:8px 0;
  border-radius:10px;
  border:none;
}

button {
  padding:12px 20px;
  background:white;
  color:black;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

textarea {
  height:200px;
}

.preview {
  margin-top:20px;
  text-align:center;
}

.preview video {
  width:100%;
  max-width:500px;
  border-radius:15px;
}

.preview img {
  max-width:500px;
  border-radius:15px;
}

.error {
  color:red;
  font-size:14px;
}
</style>
</head>

<body>

<h2>🎬 Generatore Video Temeria PRO</h2>

<input id="title" placeholder="Titolo video">
<textarea id="desc" placeholder="Descrizione"></textarea>
<input id="video" placeholder="Video (es: temeria-preview.mp4)">
<input id="image" placeholder="Immagine (es: temeria-preview.jpg)">
<input id="page" placeholder="Nome pagina (es: temeria-video)">

<button onclick="genera()">🚀 Genera tutto</button>

<div class="error" id="error"></div>

<h3>👁 Anteprima</h3>
<div class="preview" id="preview"></div>

<h3>📄 Pagina Video</h3>
<textarea id="output"></textarea>

<h3>🌐 Blocco per index.html</h3>
<textarea id="indexBlock"></textarea>

<h3>🔗 Link pronto</h3>
<textarea id="linkOut"></textarea>

<script>

function fixPath(file) {
  if (!file) return "";
  if (file.startsWith("http")) return file;
  return "https://alex-creative-site.vercel.app/" + file;
}

function genera() {

  const title = document.getElementById('title').value;
  const desc = document.getElementById('desc').value;
  const video = document.getElementById('video').value;
  const image = document.getElementById('image').value;
  const page = document.getElementById('page').value;

  const errorBox = document.getElementById('error');
  errorBox.innerText = "";

  if (!title || !video || !image || !page) {
    errorBox.innerText = "⚠️ Compila tutti i campi obbligatori";
    return;
  }

  const base = "https://alex-creative-site.vercel.app";
  const url = base + "/" + page + ".html";

  const videoPath = fixPath(video);
  const imagePath = fixPath(image);

  // ANTEPRIMA
  document.getElementById('preview').innerHTML = `
    <h4>${title}</h4>
    <img src="${imagePath}">
    <br><br>
    <video controls src="${videoPath}"></video>
  `;

  // PAGINA VIDEO
  const codice = `<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">

<title>${title}</title>

<meta property="og:title" content="${title}">
<meta property="og:description" content="${desc}">
<meta property="og:image" content="${imagePath}">
<meta property="og:url" content="${url}">
<meta property="og:type" content="video.other">

<meta name="twitter:card" content="summary_large_image">

<style>
body {
  margin:0;
  background:black;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:flex-start;
  min-height:100vh;
  color:white;
  font-family:Arial;
  text-align:center;
  padding:30px 15px;
}

.container {
  max-width:700px;
  width:100%;
}

video {
  width:100%;
  max-width:700px;
  border-radius:20px;
  box-shadow:0 0 40px rgba(0,0,0,0.7);
  margin-top:20px;
}

.top-btn {
  display:inline-block;
  margin-bottom:20px;
  padding:12px 26px;
  border-radius:30px;
  background:white;
  color:black;
  font-weight:bold;
  text-decoration:none;
}

.floating-btn {
  position:fixed;
  bottom:20px;
  right:20px;
  padding:12px 20px;
  border-radius:30px;
  background:linear-gradient(90deg,#7dd3fc,#c084fc);
  color:black;
  font-weight:bold;
  text-decoration:none;
  box-shadow:0 0 20px rgba(192,132,252,0.6);
}
</style>

</head>

<body>

<div class="container">

<a href="${base}" class="top-btn">🌐 Vai al sito completo</a>

<h2>${title}</h2>
<p>${desc}</p>

<video controls autoplay muted playsinline poster="${imagePath}">
  <source src="${videoPath}" type="video/mp4">
</video>

</div>

<a href="${base}" class="floating-btn">🌐 Sito</a>

</body>
</html>`;

  // BLOCCO INDEX (coerente con Temeria)
  const blocco = `
<article class="temeria-video-panel">

  <div class="video-tag">🎬 Video teaser</div>

  <h3 style="font-size:22px;margin:0 0 10px;">
    ${title}
  </h3>

  <p style="color:rgba(255,255,255,0.7);margin-bottom:15px;">
    Guarda il frammento
  </p>

  <a href="${url}">

    <div style="position:relative;overflow:hidden;border-radius:18px;">

      <img 
        src="${imagePath}" 
        style="width:100%;display:block;"
      >

      <div style="
        position:absolute;
        inset:0;
        display:flex;
        align-items:center;
        justify-content:center;
        background:rgba(0,0,0,0.35);
      ">

        <div style="
          width:70px;
          height:70px;
          border-radius:50%;
          background:white;
          display:flex;
          align-items:center;
          justify-content:center;
          font-size:26px;
          color:black;
          box-shadow:0 0 30px rgba(255,255,255,0.5);
        ">
          ▶
        </div>

      </div>

    </div>

  </a>

</article>`;

  document.getElementById('output').value = codice;
  document.getElementById('indexBlock').value = blocco;
  document.getElementById('linkOut').value = url;
}

</script>

</body>
</html>
