<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>🎬 Generatore Video Temeria PRO</title>

<style>
body {
  background:#0b0f1a;
  color:white;
  font-family:Arial;
  padding:30px;
}

input, textarea {
  width:100%;
  padding:10px;
  margin:8px 0;
  border-radius:10px;
  border:none;
}

button {
  padding:12px 20px;
  background:white;
  color:black;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

textarea {
  height:220px;
}

h3 {
  margin-top:30px;
}
</style>
</head>

<body>

<h2>🎬 Generatore Video Temeria PRO</h2>

<input id="title" placeholder="Titolo video">
<textarea id="desc" placeholder="Descrizione"></textarea>
<input id="video" placeholder="Nome file video (es: temeria-preview.mp4)">
<input id="image" placeholder="Nome immagine (es: temeria-preview.jpg)">
<input id="page" placeholder="Nome pagina (es: temeria-video)">

<button onclick="genera()">🚀 Genera tutto</button>

<h3>📄 Pagina Video</h3>
<textarea id="output"></textarea>

<h3>🌐 Blocco per index.html</h3>
<textarea id="indexBlock"></textarea>

<h3>🔗 Link pronto</h3>
<textarea id="linkOut"></textarea>

<script>
function genera() {
  const title = document.getElementById('title').value;
  const desc = document.getElementById('desc').value;
  const video = document.getElementById('video').value;
  const image = document.getElementById('image').value;
  const page = document.getElementById('page').value;

  const base = "https://alex-creative-site.vercel.app";
  const url = base + "/" + page + ".html";

  // PAGINA VIDEO
  const codice = `<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">

<title>${title}</title>

<meta property="og:title" content="${title}">
<meta property="og:description" content="${desc}">
<meta property="og:image" content="${base}/${image}">
<meta property="og:url" content="${url}">
<meta property="og:type" content="video.other">

<meta name="twitter:card" content="summary_large_image">

<style>
body {
  margin:0;
  background:black;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  height:100vh;
  color:white;
  font-family:Arial;
  text-align:center;
}

video {
  width:100%;
  max-width:900px;
  border-radius:20px;
  box-shadow:0 0 40px rgba(0,0,0,0.7);
}

.btn {
  margin-top:25px;
  padding:14px 30px;
  border-radius:30px;
  background:linear-gradient(90deg,#7dd3fc,#c084fc);
  color:black;
  font-weight:bold;
  text-decoration:none;
  box-shadow:0 0 20px rgba(192,132,252,0.6);
  transition:0.3s;
}

.btn:hover {
  transform:scale(1.05);
}
</style>

</head>

<body>

<h2>${title}</h2>
<p>${desc}</p>

<video controls autoplay poster="${base}/${image}">
  <source src="${base}/${video}" type="video/mp4">
</video>

<a href="${base}" class="btn">🌐 Visita il sito completo</a>

</body>
</html>`;

  // BLOCCO INDEX
  const blocco = `<a href="${url}" style="text-decoration:none;color:white;">
<div style="
  border-radius:20px;
  overflow:hidden;
  position:relative;
  max-width:400px;
  margin:auto;
">
  <img src="${base}/${image}" style="width:100%;display:block;">
  <div style="
    position:absolute;
    bottom:0;
    left:0;
    right:0;
    padding:10px;
    background:rgba(0,0,0,0.7);
  ">
    <strong>${title}</strong>
    <p style="margin:0;font-size:13px;">Guarda il frammento</p>
  </div>
</div>
</a>`;

  document.getElementById('output').value = codice;
  document.getElementById('indexBlock').value = blocco;
  document.getElementById('linkOut').value = url;
}
</script>

</body>
</html>
